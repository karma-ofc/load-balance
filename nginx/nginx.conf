events {}

http {
  # Upstream groups for different load-balancing algorithms
  upstream backend_rr {
    # Round Robin (default)
    server backend1:8000 max_fails=2 fail_timeout=30s;
    server backend2:8000 max_fails=2 fail_timeout=30s;
    server backend3:8000 backup;
  }

  upstream backend_least {
    least_conn;
    server backend2:8000;
    server backend1:8000;
  }

  upstream backend_iphash {
    ip_hash;
    server backend1:8000 max_fails=2 fail_timeout=30s;
    server backend2:8000 max_fails=2 fail_timeout=30s;
    server backend3:8000;
  }

  server {
    listen 80;
    proxy_connect_timeout 1s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;
    proxy_next_upstream error timeout http_502 http_503 http_504;
    proxy_next_upstream_tries 3;

    # Default entrypoint: use Round Robin
    location / {
      proxy_pass http://backend_rr;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Explicit endpoints to select algorithm for demo/testing
    location /rr/ {
      proxy_pass http://backend_rr;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /least/slow {
      proxy_pass http://backend_least/slow;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/least {
      proxy_pass http://backend_least;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/slow {
      proxy_pass http://backend_least;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /iphash/ {
      proxy_pass http://backend_iphash;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
