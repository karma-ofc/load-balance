services:
  backend1:
    build:
      context: ./backend
    environment:
      PORT: 8000
      SERVER_NAME: backend1

  backend2:
    build:
      context: ./backend
    environment:
      PORT: 8000
      SERVER_NAME: backend2

  backend3:
    build:
      context: ./backend
    environment:
      PORT: 8000
      SERVER_NAME: backend3-backup

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - backend1
      - backend2
      - backend3
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
